<!DOCTYPE html>
<html>
    <head>
        <title>Travel Reservation Form</title>
    </head>
    <body>
        <h1>Travel Reservation Form</h1>
        <h2>* Denotes Mandatory</h2>
            <form>
                
                    <label>Full Name*:</label>
                    <br>
                    <input type="text" placeholder="First and Last Name" required>

                    <br><br>
                    <label>Email*</label>
                    <br>
                    <input type="email" placeholder="EMAIL_ADDRESS" required>

                    <br><br>
                    <label>Select Tour Package*</label>
                    <br>
                    <select required>
                        <option>Select a package</option>
                        <option>Goa</option>
                        <option>Mumbai</option>
                        <option>Jammu</option>
                        <option>Jaipur</option>
                    </select>
                    <br><br>
                    <label>Arrival Date*:</label>
                    <br>
                    <input type="date"required>

                    <br><br>
                    <label>Number of People*:</label>
                    <br>
                    <input type="number"required>

                    <br><br>
                    <label>Arrival Date*:</label>
                    <br>
                    <input type="date"required>

                    <br><br>
                    <label>What would you want to avail?*:</label>
                    <br>
                    Boarding<input type="checkbox" ><br>
                    Fooding<input type="checkbox" ><br>
                    Sight Seeing<input type="checkbox"><br>

                    <br><br>
                    <label>Discount cupon code:</label>
                    <br>
                    <input type="text" placeholder="Code if any">

                    <br><br>
                    <label>Terms and Conditions*:</label>
                    <br>
                    Agree<input type="radio" name="tnc"><br>
                    Disagree<input type="radio" name="tnc"><br>

                    <br>
                    <button type="submit">Complete Reservation</button>
            </form>
        </table>
    </body>
</html>
