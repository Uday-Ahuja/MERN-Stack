<!DOCTYPE html>
<html>
    <head>
        <title>Student Registeration Form</title>
    </head>
    <body>
        <table border="1">
            <form method="get">
               <tr> <th><label><h1><u><i>Student Registeration Form</i></u></h1> </label>
                </th>
                <th> <input type="file"></th>
            </tr>
            <tr>
                <td><label>Enter Name</label></td>
                <td bgcolor="lightgrey"><input type="text" placeholder="Enter name"/></td>
            </tr>
            <tr>
                <td><label>Password</label></td>
                <td bgcolor="lightgrey"><input type="password"placeholder="enter password"/></td>
            </tr>
            <tr>
                <td><label>Confirm Password</label></td>
                <td bgcolor="lightgrey"><input type="password"placeholder="re-enter the password"/></td>
            </tr>
            <tr>
                <td><label>Gender</label></td>
                <td bgcolor="lightgrey"><input type="radio"name="gender"/> Male &nbsp;
                    <input type="radio"name="gender"/>Female
                </td>
            </tr>
            <tr>
                <td><label>Hobbies</label></td>
                <td bgcolor="lightgrey"><input type="checkbox"/> playing &nbsp;
                    <input type="checkbox"/>drawing
                    <br>
                    <input type="checkbox"/> Reading &nbsp;
                    <input type="checkbox"/>swimming
                </td>
            </tr>
            <tr>
                <td><label>Nationality</label></td>
                <td bgcolor="lightgrey"><input type="radio"name="Nationality"/> Indian &nbsp;
                    <input type="radio"name="Nationality"/>NRI &nbsp;
                    <input type="radio"name="Nationality"/>Others &nbsp;
                </td>
            </tr>
            <tr>
                <td>
                    <label>Last Class Results</label>
                </td>
                <td bgcolor="lightgrey">
                    <input type="file">
                </td>
            </tr>
            <tr>
                <td>
                    <label>Other Certificates</label>
                </td>
                <td bgcolor="lightgrey">
                    <input type="file">
                </td>
            </tr>
            <tr>
                <td><label>Special Ability</label></td>
                <td bgcolor="lightgrey"> <textarea rows="3" cols="30" placeholder="Enter Special abilities if any else NA"></textarea></td>
            </tr>
            <tr>
               <td><button type="submit">Submit</button></td>
                <td><button type="reset">Reset</button></td>
            </tr>
            </form>
        </table>
    </body>
</html>
