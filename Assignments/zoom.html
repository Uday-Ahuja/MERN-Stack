<!DOCTYPE html>
<html>
<head>
    <title>Image Zoom</title>
    <style>
        body {
            text-align: center;
            padding: 50px;
        }
        #myImage {
            width: 300px;
            border: 1px solid black;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <h2>Image Zoom Example</h2>
    <img id="myImage" src="./Static Website/pageturnerlogo.png" >
    <br>
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>

    <script>
        let img = document.getElementById('myImage');
        let currentWidth = 300;

        function zoomIn() {
            currentWidth += 50;
            img.style.width = currentWidth + 'px';
        }

        function zoomOut() {
            if(currentWidth > 100) {
                currentWidth -= 50;
                img.style.width = currentWidth + 'px';
            }
        }
    </script>
</body>
</html>
